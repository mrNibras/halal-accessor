# ─── Docker Compose for Local Development ───
# Use this when developing locally with a local PostgreSQL
# Run: docker compose -f docker-compose.dev.yml up -d

services:
  # ─── Local PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-halal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-halal_password}
      POSTGRES_DB: ${POSTGRES_DB:-halal_accessor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-halal}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
