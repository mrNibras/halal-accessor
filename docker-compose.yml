services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-halal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-halal_password}
      POSTGRES_DB: ${POSTGRES_DB:-halal_accessor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-halal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (Express + Prisma) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-halal}:${POSTGRES_PASSWORD:-halal_password}@db:5432/${POSTGRES_DB:-halal_accessor}?schema=public
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Frontend (Vite + React → nginx) ───
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
